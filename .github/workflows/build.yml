name: Build MidpointUltraBoostPvP

# Собираем при пуше/PR в любую ветку и вручную (кнопка Run workflow)
on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка JDK 21 (обязателен для Minecraft 1.21.4 / Fabric Loom)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Используем официальный action Gradle — он сам скачает нужную версию
      # Gradle, поэтому commit'ить gradle-wrapper.jar в репозиторий не нужно.
      - name: Настройка Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Сборка мода (gradle build)
        run: gradle build --stacktrace --no-daemon

      # Готовый .jar мода лежит в build/libs/
      - name: Публикация собранного .jar как артефакта сборки
        uses: actions/upload-artifact@v4
        with:
          name: midpoint-ultra-boost-pvp
          path: build/libs/*.jar
          if-no-files-found: error
