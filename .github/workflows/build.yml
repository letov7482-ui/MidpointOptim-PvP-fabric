name: Build MidpointUltraBoostPvP

# Запускается при любом push, PR или вручную
on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем архив
      - name: Download ZIP
        run: |
          curl -L -o midpoint-ultra-boost-pvp.zip \
            https://raw.githubusercontent.com/midpoint/midpoint-ultra-boost-pvp/main/midpoint-ultra-boost-pvp.zip \
            || curl -L -o midpoint-ultra-boost-pvp.zip \
               https://github.com/midpoint/midpoint-ultra-boost-pvp/archive/main.zip

      # 2. Распаковываем
      - name: Unzip
        run: |
          unzip -q midpoint-ultra-boost-pvp.zip
          mv midpoint-ultra-boost-pvp mod-project || mv midpoint-ultra-boost-pvp-main mod-project
          rm midpoint-ultra-boost-pvp.zip

      # 3. Настройка JDK + Gradle (Fabric 1.21.4 требует именно так)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # 4. Сборка (твой оригинальный gradle build)
      - name: Build
        run: ./gradlew build --stacktrace --no-daemon
        working-directory: ./mod-project

      # 5. Артефакт
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: midpoint-ultra-boost-pvp
          path: mod-project/build/libs/*.jar
          if-no-files-found: error
